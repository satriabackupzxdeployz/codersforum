<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coders</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script>
        if (!localStorage.getItem('coders_uid') && !window.location.hash.includes('access_token')) {
            window.location.href = '/';
        }
    </script>
</head>
<body>
    <div class="banned-overlay" id="bannedOverlay">
        <h1>Account has been banned</h1>
        <button onclick="logoutBanned()">Logout Account</button>
    </div>

    <div class="media-overlay" id="mediaOverlay">
        <span class="close-media" onclick="closeMedia()">&times;</span>
        <div id="mediaContent" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;"></div>
    </div>

    <div class="top-header">
        <a href="#" class="logo">Coders</a>
        <button onclick="logout()" style="background:transparent; color:white; border:none; font-weight:bold; cursor:pointer;">Keluar</button>
    </div>
    
    <div class="sidebar-left" id="desktopSidebar">
        <div>
            <div class="logo" style="padding: 12px;">Coders</div>
            <button class="post-submit" style="width:100%; margin-top:20px;" onclick="document.getElementById('postInput').focus()">Post</button>
            <button class="post-submit" style="width:100%; margin-top:20px; background:transparent; border:1px solid white;" onclick="logout()">Keluar</button>
        </div>
    </div>

    <div class="main-content active" id="homePage">
        <div class="feed-tabs">
            <div class="tab active">Untuk Anda</div>
        </div>
        <div class="post-compose">
            <div class="user-avatar" id="currentUserAvatar"></div>
            <div class="post-input-container">
                <textarea class="post-input" id="postInput" placeholder="Apa yang sedang terjadi?"></textarea>
                <div class="post-actions">
                    <input type="file" id="mediaUploadInput" accept="image/*,video/*">
                    <button class="post-submit" id="postSubmit">Post</button>
                </div>
            </div>
        </div>
        <div class="feed" id="postFeed"></div>
    </div>
    
    <nav class="bottom-nav">
        <button class="nav-item active"><i class="fas fa-home"></i></button>
        <button class="nav-item"><i class="fas fa-search"></i></button>
        <button class="nav-item"><i class="fas fa-user"></i></button>
    </nav>

    <script src="/js/app.js"></script>
</body>
</html>
